body {
  font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
  background: #fafafa;
  overflow-x: hidden;
}

/* ── HERO BANNER ── */
.hero {
  position: relative;
  width: 100%;
  overflow: hidden;
  line-height: 0;
}

/* PC 이미지 기본, MO 이미지 숨김 */
.hero-img-pc {
  width: 100%;
  display: block;
  object-fit: cover;
}

.hero-img-mo {
  width: 100%;
  display: none;
  object-fit: cover;
}

/* ── PC2: 내 점수 확인하기 ── */
.section-search {}

.section-title {
  width: 100%;
  padding: 14px 32px;
  font-family: 'Pretendard', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: #fff;
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title.search-title { background: #E26554; }
.section-title.chart-title { background: #7598C7; color: #fff; }
.section-title.table-title { background: #FFE9A1; color: #1a1a1a; }

.section-body {
  padding: 32px;
}

.section-body.search-body { background: #F4CABB; }
.section-body.chart-body { background: #D1DAE0; }
.section-body.table-body { background: #FDF9EC; }

/* 검색 인풋 */
.search-input-wrap {
  position: relative;
  max-width: 560px;
}

.search-input-wrap input {
  width: 100%;
  background: rgba(255,255,255,0.85);
  border: 2.5px solid rgba(226,101,84,0.35);
  border-radius: 12px;
  padding: 14px 20px 14px 48px;
  font-family: 'Pretendard', sans-serif;
  font-size: 15px; color: #333;
  outline: none;
  transition: all 0.2s;
  box-shadow: 0 2px 10px rgba(226,101,84,0.12);
}

.search-input-wrap input:focus {
  border-color: #E26554;
  background: #fff;
  box-shadow: 0 4px 16px rgba(226,101,84,0.2);
}

.search-input-wrap input::placeholder { color: #bbb; }

.search-input-icon {
  position: absolute; left:15px; top:50%;
  transform: translateY(-50%);
  font-size: 18px; pointer-events:none;
}

/* 검색 결과 카드 */
.search-result {
  display: none;
  margin-top: 16px;
  max-width: 560px;
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 28px rgba(226,101,84,0.18);
  animation: slideDown 0.2s ease;
}

@keyframes slideDown {
  from { opacity:0; transform:translateY(-6px); }
  to { opacity:1; transform:translateY(0); }
}

.search-result.show { display: block; }

.result-header {
  background: #E26554;
  padding: 14px 20px;
  display: flex; align-items: center; gap: 10px;
}

.result-name {
  font-weight: 700; font-size: 17px; color: white;
  font-family: 'Pretendard', sans-serif;
}

.result-rank-badge {
  margin-left: auto;
  background: rgba(255,255,255,0.25);
  color: white; font-weight: 700; font-size: 12px;
  padding: 3px 12px; border-radius: 20px;
  font-family: 'Pretendard', sans-serif;
}

.result-stats {
  display: grid; grid-template-columns: 1fr 1fr;
}

.r-stat {
  padding: 18px 22px;
  display: flex; flex-direction: column; gap: 4px;
}

.r-stat:first-child { border-right: 1.5px solid #f0e0d8; }

.r-stat-label {
  font-size: 10px; color: #aaa; font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase;
  font-family: 'Pretendard', sans-serif;
}

.r-stat-val {
  font-size: 32px; font-weight: 800; line-height: 1;
  font-family: 'Pretendard', sans-serif;
}

.r-stat-val.pos { color: #2ECC71; }
.r-stat-val.neg { color: #E26554; }
.r-stat-val.neu { color: #7598C7; }

.no-result {
  margin-top: 12px; padding: 12px 16px;
  background: rgba(255,255,255,0.6);
  border-radius: 10px; font-size: 14px;
  color: #a0705a; max-width: 560px;
  font-family: 'Pretendard', sans-serif;
  text-align: center;
}

/* ── 통계 미니카드 (검색 섹션 내) ── */
.mini-stats {
  display: flex; gap: 14px; margin-top: 20px; flex-wrap: wrap;
  max-width: 700px;
}

.mini-card {
  background: rgba(255,255,255,0.7);
  border-radius: 14px; padding: 14px 20px;
  display: flex; flex-direction: column; gap: 3px;
  flex: 1; min-width: 130px;
  box-shadow: 0 2px 8px rgba(226,101,84,0.1);
}

.mini-card-emoji { font-size: 20px; }
.mini-card-val {
  font-size: 20px; font-weight: 800; color: #E26554;
  font-family: 'Pretendard', sans-serif; line-height: 1.2;
}
.mini-card-label {
  font-size: 11px; color: #a0705a;
  font-family: 'Pretendard', sans-serif;
}

/* ── 차트 ── */
.chart-container {
  background: rgba(255,255,255,0.5);
  border-radius: 16px; padding: 20px;
  height: 360px; position: relative;
}

/* ── 테이블 ── */
.table-wrap {
  background: rgba(255,255,255,0.6);
  border-radius: 16px; overflow: hidden;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}

table { width: 100%; border-collapse: collapse; }

thead th {
  padding: 13px 18px;
  font-size: 11px; letter-spacing: 1px;
  color: #8a7a40; text-align: left;
  font-weight: 700; text-transform: uppercase;
  background: rgba(255,233,161,0.6);
  border-bottom: 2px solid rgba(255,233,161,0.8);
  font-family: 'Pretendard', sans-serif;
  position: sticky; top: 0;
}

thead th.num { text-align:center; width:52px; }
thead th.score-col { text-align:right; }

tbody tr {
  border-top: 1.5px solid rgba(255,233,161,0.5);
  transition: background 0.15s;
}

tbody tr:hover { background: rgba(255,255,255,0.7); }

tbody td {
  padding: 12px 18px; font-size: 14px;
  font-family: 'Pretendard', sans-serif;
}

td.rank-cell { text-align:center; width:52px; }

.rank-medal {
  display: inline-flex; align-items:center; justify-content:center;
  width: 28px; height: 28px; border-radius: 50%;
  font-size: 13px; font-weight: 800;
  font-family: 'Pretendard', sans-serif;
}
.rank-medal.gold { background: linear-gradient(135deg,#FFD700,#FFA500); color:white; box-shadow:0 2px 6px rgba(255,215,0,0.4); }
.rank-medal.silver { background: linear-gradient(135deg,#C0C0C0,#909090); color:white; }
.rank-medal.bronze { background: linear-gradient(135deg,#CD7F32,#A0522D); color:white; }
td.rank-num { color:#bbb; font-weight:700; font-size:13px; text-align:center; }

td.name-cell { font-weight:600; color:#2a2a2a; }

td.score-cell, td.total-cell {
  text-align:right; font-weight:700; font-size:15px;
  font-family: 'Pretendard', sans-serif;
}
td.score-cell.pos, td.total-cell.pos { color:#2ECC71; }
td.score-cell.neg, td.total-cell.neg { color:#E26554; }
td.score-cell.zero, td.total-cell.zero { color:#ccc; }

/* ── FOOTER ── */
footer {
  background: #1a1a1a;
  padding: 22px 32px;
  text-align: center;
}
.footer-txt {
  font-size: 13px; color: rgba(255,255,255,0.45);
  font-family: 'Pretendard', sans-serif;
}
.footer-txt strong { color: rgba(255,255,255,0.8); }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .hero-img-pc { display: none; }
  .hero-img-mo { display: block; }

  .section-title {
    padding: 12px 20px;
    font-size: 16px;
  }

  .section-body {
    padding: 20px 16px;
  }

  .mini-stats {
    display: grid !important;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }

  .mini-card {
    min-width: 0;
    min-height: 130px;
    padding: 12px 14px;
  }

  .chart-container { height: 400px; }

  thead th { padding: 10px 10px; font-size: 10px; letter-spacing:0; }
  tbody td { padding: 10px 10px; font-size: 13px; }

  .r-stat-val { font-size: 26px; }
}
</style>
</head>

<!-- ── PC2 / MO2 : 내 점수 확인하기 ── -->
<section class="section-search">
  <div class="section-title search-title">내 점수 확인하기 &gt;</div>
  <div class="section-body search-body">

    <div class="search-input-wrap">
      <span class="search-input-icon">🔎</span>
      <input type="text" id="searchInput" placeholder="이름을 입력하세요 (예: 김용진)" autocomplete="off">
    </div>

    <div class="search-result" id="searchResult">
      <div class="result-header">
        <span class="result-name" id="resultName"></span>
        <div class="result-rank-badge">누적 상점 <span id="resultRank"></span>위 🏅</div>
      </div>
      <div class="result-stats">
        <div class="r-stat">
          <div class="r-stat-label">누적 상점</div>
          <div class="r-stat-val neu" id="resultQ1">—</div>
        </div>
        <div class="r-stat">
          <div class="r-stat-label">상벌점 합계</div>
          <div class="r-stat-val" id="resultTotal">—</div>
        </div>
      </div>
    </div>

    <div class="no-result" id="noResult" style="display:none;">😅 검색 결과가 없어요. 이름을 다시 확인해주세요!</div>

    <div class="mini-stats" id="miniStats" style="display:none;">
      <div class="mini-card">
        <div class="mini-card-emoji">🏆</div>
        <div class="mini-card-val" id="topScorer">—</div>
        <div class="mini-card-label">코기 상점 MVP</div>
      </div>
      <div class="mini-card">
        <div class="mini-card-emoji">⭐</div>
        <div class="mini-card-val" id="totalPoints">—</div>
        <div class="mini-card-label">누적 상벌점 합계</div>
      </div>
      <div class="mini-card">
        <div class="mini-card-emoji">⚠️</div>
        <div class="mini-card-val" id="dangerCount">—</div>
        <div class="mini-card-label">위험 멤버</div>
      </div>
      <div class="mini-card">
        <div class="mini-card-emoji">👥</div>
        <div class="mini-card-val" id="memberCount">—</div>
        <div class="mini-card-label">전체 멤버</div>
      </div>
    </div>

  </div>
</section>

<!-- ── PC3 : 2분기 상점 순위 ── -->
<section class="section-chart">
  <div class="section-title chart-title">누적 상벌점 순위</div>
  <div class="section-body chart-body">
    <div class="chart-container">
      <canvas id="rankChart"></canvas>
    </div>
  </div>
</section>

<!-- ── PC4 : 전체 멤버 현황 ── -->
<section class="section-table">
  <div class="section-title table-title">전체 멤버 현황</div>
  <div class="section-body table-body">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="num">순위</th>
            <th>이름</th>
            <th class="score-col">누적 상점</th>
            <th class="score-col">누적 벌점</th>
            <th class="score-col">상벌점 합계</th>
          </tr>
        </thead>
        <tbody id="memberTable"></tbody>
      </table>
    </div>
  </div>
</section>

<footer>
  <div class="footer-txt">
    <strong>🐕 헬시코기 크루</strong> &nbsp;·&nbsp; 상벌점 현황
  </div>
</footer>

<script>
const SHEET_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQt9Ro4QrbwnGb7nGBibDnxBlnxAjRIGFdQW0RuzLj-SNi-_T9JZiPZ0vstZW5YRg/pub?gid=1681429544&single=true&output=csv";
let raw = [], chartInstance = null;

async function loadData() {
  try {
    const res = await fetch(SHEET_CSV);
    const text = await res.text();
    parseCSV(text);
    renderAll();
  } catch(e) {
    document.getElementById('memberTable').innerHTML =
      '<tr><td colspan="4" style="text-align:center;padding:24px;color:#aaa;font-family:Pretendard,sans-serif">데이터를 불러오는 중 오류가 발생했습니다.</td></tr>';
  }
}

function parseCSV(text) {
  const lines = text.split('\n').map(l => l.split(','));
  raw = [];
  for (let i = 2; i < lines.length; i++) {
    const row = lines[i];
    if (!row[4] || !row[4].trim()) continue;
    const name = row[4].replace(/"/g,'').trim();
    if (!name || name === '이름') continue;
    const point = parseInt(row[1])||0;  // B: 누적 상점
    const minus = parseInt(row[2])||0;  // C: 누적 벌점
    const total = parseInt(row[3])||0;  // D: 상벌점 합계
    raw.push({ name, q1: point, penalty: minus, total });
  }
  document.getElementById('memberCount').textContent = raw.length + '명';
}

function renderAll() {
  const sorted = [...raw].sort((a,b) => b.total - a.total);
  let rankMap = {};
  sorted.forEach((m,i) => {
    if (i===0 || sorted[i-1].total !== m.total) rankMap[m.name] = i+1;
    else rankMap[m.name] = rankMap[sorted[i-1].name];
  });

  if (sorted.length > 0) {
    document.getElementById('miniStats').style.display = 'flex';
    document.getElementById('topScorer').textContent = sorted[0].name;
    document.getElementById('totalPoints').textContent = (sorted[0].total>=0?'+':'') + sorted[0].total + '점';
    document.getElementById('dangerCount').textContent = raw.filter(m=>m.total<=-2).length + '명';
  }

  // 검색
  const si = document.getElementById('searchInput');
  const sr = document.getElementById('searchResult');
  const nr = document.getElementById('noResult');

  si.addEventListener('input', () => {
    const q = si.value.trim();
    if (!q) { sr.classList.remove('show'); nr.style.display='none'; return; }
    const found = raw.filter(m => m.name.includes(q));
    if (!found.length) { sr.classList.remove('show'); nr.style.display='block'; return; }
    nr.style.display = 'none';
    const m = found[0];
    document.getElementById('resultName').textContent = m.name;
    document.getElementById('resultRank').textContent = rankMap[m.name];
    document.getElementById('resultQ1').textContent = (m.q1>=0?'+':'') + m.q1;
    const te = document.getElementById('resultTotal');
    te.textContent = (m.total>=0?'+':'') + m.total;
    te.className = 'r-stat-val ' + (m.total>0?'pos':m.total<0?'neg':'neu');
    sr.classList.add('show');
  });

  // 차트
  const isMobile = window.innerWidth < 768;
  const chartData = sorted.slice(0, isMobile ? 12 : 20);
  const ctx = document.getElementById('rankChart').getContext('2d');
  if (chartInstance) chartInstance.destroy();

  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: chartData.map(m => m.name),
      datasets: [{
        label: '상벌점 합계',
        data: chartData.map(m => m.total),
        backgroundColor: chartData.map((_,i) =>
          i===0 ? '#FFD700' : i===1 ? '#C0C0C0' : i===2 ? '#CD7F32' : '#7598C7cc'
        ),
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      indexAxis: isMobile ? 'y' : 'x',
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => `상벌점 합계: ${c.parsed[isMobile?'x':'y']}점` } }
      },
      scales: {
        x: {
          ticks: { color:'#7598C7', font:{ size:isMobile?11:10, family:'Pretendard' }, maxRotation:isMobile?0:45, stepSize: 1 },
          grid: { color:'rgba(117,152,199,0.2)' },
          beginAtZero: true
        },
        y: {
          ticks: { color:isMobile?'#2a2a2a':'#7598C7', font:{ size:11, family:'Pretendard' }, stepSize: 1 },
          grid: { color:'rgba(117,152,199,0.2)' },
          beginAtZero: !isMobile
        }
      }
    }
  });

  // 테이블
  const tbody = document.getElementById('memberTable');
  tbody.innerHTML = '';
  sorted.forEach(m => {
    const rank = rankMap[m.name];
    const rh = rank===1
      ? '<span class="rank-medal gold">1</span>'
      : rank===2 ? '<span class="rank-medal silver">2</span>'
      : rank===3 ? '<span class="rank-medal bronze">3</span>'
      : `<span class="rank-num">${rank}</span>`;
    const q1c = m.q1>0?'pos':m.q1<0?'neg':'zero';
    const pc  = m.penalty>0?'pos':m.penalty<0?'neg':'zero';
    const tc  = m.total>0?'pos':m.total<0?'neg':'zero';
    const tr = document.createElement('tr');
    if (m.total <= -2) tr.style.background = 'rgba(226,101,84,0.08)';
    tr.innerHTML = `
      <td class="rank-cell">${rh}</td>
      <td class="name-cell">${m.name}${m.total<=-2?' ⚠️':''}</td>
      <td class="score-cell ${q1c}">${m.q1>=0?'+':''}${m.q1}</td>
      <td class="score-cell ${pc}">${m.penalty>=0?'+':''}${m.penalty}</td>
      <td class="total-cell ${tc}">${m.total>=0?'+':''}${m.total}</td>
    `;
    tbody.appendChild(tr);
  });
}

loadData();
</script>
</body>
</html>
